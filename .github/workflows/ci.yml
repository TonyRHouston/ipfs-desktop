name: ci
on:
- push
- pull_request
env:
  XDG_CACHE_HOME: ${{ github.workspace }}/.cache
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
jobs:
  webui:
    runs-on: ubuntu-latest
    steps:
    - name: Check out Git repository
      uses: actions/checkout@v2
    - name: Install Node.js
      uses: actions/setup-node@v2
      with:
        node-version: lts/*
    - name: Cache webui
      uses: actions/cache@v2
      id: webui-cache
      with:
        path: assets/webui
        key: ${{ hashFiles('package.json') }}
    - name: Cache bigger downloads
      uses: actions/cache@v2
      id: cache
      if: steps.webui-cache.outputs.cache-hit != 'true'
      with:
        path: ${{ github.workspace }}/.cache
        key: ${{ runner.os }}-${{ hashFiles('package.json', 'package-lock.json', 'electron-builder.yml')
          }}
        restore-keys: '${{ runner.os }}-${{ hashFiles(''package.json'', ''package-lock.json'',
          ''electron-builder.yml'') }}

          ${{ runner.os }}-

          '
    - uses: ipfs/download-ipfs-distribution-action@v1
      if: steps.webui-cache.outputs.cache-hit != 'true'
      with:
        name: go-ipfs
    - uses: ipfs/start-ipfs-daemon-action@v1
      if: steps.webui-cache.outputs.cache-hit != 'true'
    - name: Install dependencies and fetch ipfs-webui
      if: steps.webui-cache.outputs.cache-hit != 'true'
      run: 'npm ci --prefer-offline --no-audit --progress=false --cache ${{ github.workspace
        }}/.cache/npm

        npm run clean

        npm run force-webui-download

        '
    - name: Attach cached ipfs-webui to Github Action
      uses: actions/upload-artifact@v2
      with:
        name: ipfs-webui
        path: assets/webui
        if-no-files-found: error
  test:
    runs-on: ubuntu-latest
    needs: webui
    strategy:
      fail-fast: false
      matrix:
        os:
        - macos-latest
        - ubuntu-latest
        - windows-latest
    steps:
    - name: Check out Git repository
      uses: actions/checkout@v2
    - name: Install Node.js
      uses: actions/setup-node@v2
      with:
        node-version: lts/*
    - name: Cache webui
      uses: actions/cache@v2
      id: webui-cache
      with:
        path: assets/webui
        key: ${{ hashFiles('package.json') }}
    - name: Cache bigger downloads
      uses: actions/cache@v2
      id: cache
      with:
        path: ${{ github.workspace }}/.cache
        key: ${{ runner.os }}-${{ hashFiles('package.json', 'package-lock.json', 'electron-builder.yml')
          }}
        restore-keys: '${{ runner.os }}-${{ hashFiles(''package.json'', ''package-lock.json'',
          ''electron-builder.yml'') }}

          ${{ runner.os }}-

          '
    - uses: ipfs/download-ipfs-distribution-action@v1
      if: steps.webui-cache.outputs.cache-hit != 'true'
      with:
        name: go-ipfs
    - uses: ipfs/start-ipfs-daemon-action@v1
      if: steps.webui-cache.outputs.cache-hit != 'true'
    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit --progress=false --cache ${{ github.workspace
        }}/.cache/npm
    - name: Build
      run: npm run build
    - name: Stop any ipfs daemon before tests
      run: ipfs shutdown || true
      shell: bash
    - name: Test
      run: npm run test
    - name: Test end-to-end
      uses: GabrielBB/xvfb-action@86d97bde4a65fe9b290c0b3fb92c2c4ed0e5302d
      with:
        working-directory: ${{ github.workspace }}
        run: npm run test:e2e
    - name: Lint
      run: npm run lint
  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os:
        - macos-latest
        - ubuntu-latest
        - windows-latest
    steps:
    - name: Check out Git repository
      uses: actions/checkout@v2
    - name: Install Node.js
      uses: actions/setup-node@v2
      with:
        node-version: lts/*
    - name: Cache webui
      uses: actions/cache@v2
      id: webui-cache
      with:
        path: assets/webui
        key: ${{ hashFiles('package.json') }}
    - name: Cache bigger downloads
      uses: actions/cache@v2
      id: cache
      with:
        path: ${{ github.workspace }}/.cache
        key: ${{ runner.os }}-${{ hashFiles('package.json', 'package-lock.json', 'electron-builder.yml')
          }}
        restore-keys: '${{ runner.os }}-${{ hashFiles(''package.json'', ''package-lock.json'',
          ''electron-builder.yml'') }}

          ${{ runner.os }}-

          '
    - uses: ipfs/download-ipfs-distribution-action@v1
      if: steps.webui-cache.outputs.cache-hit != 'true'
      with:
        name: go-ipfs
    - uses: ipfs/start-ipfs-daemon-action@v1
      if: steps.webui-cache.outputs.cache-hit != 'true'
    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit --progress=false --cache ${{ github.workspace
        }}/.cache/npm
    - name: Build
      run: npm run build
    - name: Get tag
      id: tag
      uses: dawidd6/action-get-tag@12319896edaa290b27558e34a177804e9b8d077b
      continue-on-error: true
    - name: Build binaries with electron-builder
      uses: samuelmeuli/action-electron-builder@92327c67bc45ff7c38bf55d8aa8c4d75b7ea38e7
      with:
        args: --publish onTag
        release: false
        max_attempts: 2
        github_token: ${{ secrets.github_token }}
        windows_certs: ${{ secrets.windows_certs }}
        windows_certs_password: ${{ secrets.windows_certs_password }}
        mac_certs: ${{ secrets.mac_certs }}
        mac_certs_password: ${{ secrets.mac_certs_password }}
      env:
        CI_BUILD_TAG: ${{steps.tag.outputs.tag}}
        APPLEID: ${{ secrets.apple_id }}
        APPLEIDPASS: ${{ secrets.apple_id_pass }}
    - name: Show dist/
      run: du -sh dist/ && ls -l dist/
    - name: Attach produced packages to Github Action
      uses: actions/upload-artifact@v2
      with:
        name: dist-${{ matrix.os }}
        path: dist/*esktop*.*
        if-no-files-found: error
    - name: Show Cache
      run: du -sh ${{ github.workspace }}/.cache/ && ls -l ${{ github.workspace }}/.cache/
